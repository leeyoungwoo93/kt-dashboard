<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KT 무선판매 전략 대시보드 V2</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="sales.js"></script>
<script src="subs.js"></script>
<script src="commission.js"></script>
<script src="device.js"></script>
<script src="inventory.js"></script>
<script src="ktoa.js"></script>
<style>
:root{--bg:#f4fbfb;--card:#fff;--ink:#093636;--muted:#5d7a7a;--line:#d8ecec;--teal:#006464;--teal2:#128c8c;--teal3:#bfe8e8;--chip:#e6f7f7;}
*{box-sizing:border-box} body{margin:0;font-family:Inter,Segoe UI,Apple SD Gothic Neo,sans-serif;background:linear-gradient(180deg,#f6fbfb,#eef7f7);color:var(--ink)}
header{padding:20px 24px;background:linear-gradient(135deg,#004a4a,#128c8c);color:#fff;position:sticky;top:0;z-index:30;box-shadow:0 6px 20px rgba(0,0,0,.08)}
header h1{margin:0;font-size:24px} header p{margin:6px 0 0;opacity:.85}
.main{display:grid;grid-template-columns:310px 1fr;gap:18px;padding:18px}
.sidebar{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;height:calc(100vh - 110px);position:sticky;top:94px;overflow:auto}
.content{min-width:0}
.section{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:18px;box-shadow:0 6px 24px rgba(0,80,80,.05)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}.tab{padding:10px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);cursor:pointer;font-size:13px}.tab.active{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff;border-color:transparent}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.kpi{padding:14px;border-radius:16px;background:linear-gradient(135deg,#f7ffff,#e9f7f7);border:1px solid var(--line)}.kpi .label{font-size:12px;color:var(--muted)}.kpi .value{font-size:26px;font-weight:700;margin-top:6px}
label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}.checklist{max-height:170px;overflow:auto;border:1px solid var(--line);border-radius:12px;padding:8px;background:#fcffff}.check{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:13px}
button{cursor:pointer;border:none;background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff;padding:10px 12px;border-radius:10px}.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 14px}.mini{font-size:12px;color:var(--muted)}
.table-wrap{overflow:auto;max-height:480px;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:9px 10px;border-bottom:1px solid #edf5f5;text-align:right;white-space:nowrap}th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:#fff}th{position:sticky;top:0;background:#f5fbfb;z-index:1}
.card-title{font-weight:700;margin:0 0 8px}.plot{height:380px}.plot.short{height:320px}.hidden{display:none}
.note{padding:10px 12px;border-radius:12px;background:#f8fdfd;border:1px dashed var(--line);font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<header><h1>KT 무선판매 전략 대시보드 V2</h1><p>드릴다운 일원화 · teal theme · 수수료/건전성/KTOA 정비 버전</p></header>
<div class="main">
  <aside class="sidebar">
    <div class="toolbar"><button id="resetBtn">↺ 전체 초기화</button></div>
    <label>본부</label><div id="hqFilter" class="checklist"></div>
    <label>담당·지사</label><div id="divisionFilter" class="checklist"></div>
    <label>채널</label><div id="channelFilter" class="checklist"></div>
    <label>대리점</label><div id="agencyFilter" class="checklist"></div>
    <div class="note" style="margin-top:12px">막대 클릭 시 같은 필터가 전체 탭에 반영된다. 별도 탭 이동 없이 하단 카드/테이블까지 같이 드릴다운된다.</div>
  </aside>
  <main class="content">
    <div class="section">
      <div class="tabs" id="tabs"></div>
      <div class="mini">현재 필터: <span id="currentFilterText"></span></div>
    </div>
    <div id="tab-org" class="tab-pane"></div>
    <div id="tab-quality" class="tab-pane hidden"></div>
    <div id="tab-struct" class="tab-pane hidden"></div>
    <div id="tab-health" class="tab-pane hidden"></div>
    <div id="tab-device" class="tab-pane hidden"></div>
    <div id="tab-commission" class="tab-pane hidden"></div>
    <div id="tab-ktoa" class="tab-pane hidden"></div>
  </main>
</div>
<script>
const sales = window.__SALES__ || [];
const subs = window.__SUBS__ || [];
const commissions = window.__COMMISSION__ || [];
const devices = window.__DEVICE__ || [];
const inventory = window.__INVENTORY__ || [];
const ktoa = window.__KTOA__ || [];
const state = { tab:'org', filters:{hq:new Set(), division:new Set(), channel:new Set(), agency:new Set()} };
const TAB_DEFS = [
  ['org','① 조직·대리점 실적'],['quality','② 판매 Quality'],['struct','③ 가입구조'],['health','④ 채널 건전성'],['device','⑤ 단말·재고'],['commission','⑥ 수수료'],['ktoa','⑦ 사업자실적(KTOA)']
];
function fmt(n){ return new Intl.NumberFormat('ko-KR',{maximumFractionDigits:0}).format(Math.round(n||0)); }
function pct(n,d){ return d? (n*100/d):0; }
function avg(n,d){ return d? n/d:0; }
function uniq(arr){ return [...new Set(arr.filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'ko')); }
function sum(arr,key){ return arr.reduce((s,r)=>s+(+r[key]||0),0); }
function groupBy(arr, keyFn){ const m={}; for(const r of arr){ const k=keyFn(r); (m[k]||(m[k]=[])).push(r);} return m; }
function weightedAvg(arr, numKey, wtKey){ const num=sum(arr,numKey), wt=sum(arr,wtKey); return wt? num/wt:0; }
function applyFilters(rows){ return rows.filter(r=>
  (!state.filters.hq.size || state.filters.hq.has(r.hq)) &&
  (!state.filters.division.size || state.filters.division.has(r.division)) &&
  (!state.filters.channel.size || state.filters.channel.has(r.channel)) &&
  (!state.filters.agency.size || state.filters.agency.has(r.agency_name))
); }
function filterSubs(rows){ return rows.filter(r=>
  (!state.filters.hq.size || state.filters.hq.has(r.hq)) &&
  (!state.filters.division.size || state.filters.division.has(r.division)) &&
  (!state.filters.agency.size || state.filters.agency.has(r.agency_name))
); }
function renderChecklist(id, items, setObj){
  const el=document.getElementById(id); el.innerHTML='';
  const allWrap=document.createElement('div'); allWrap.className='check';
  allWrap.innerHTML=`<input type="checkbox" ${setObj.size===0?'checked':''} /> <b>전체</b>`;
  allWrap.onclick=()=>{ setObj.clear(); refresh(); };
  el.appendChild(allWrap);
  items.forEach(v=>{ const row=document.createElement('label'); row.className='check'; row.innerHTML=`<input type="checkbox" ${setObj.has(v)?'checked':''}/> <span>${v}</span>`; row.onclick=(e)=>{e.preventDefault(); if(setObj.has(v)) setObj.delete(v); else setObj.add(v); refresh();}; el.appendChild(row); });
}
function currentFilterText(){
  const f=state.filters; const parts=[];
  if(f.hq.size) parts.push('본부: '+[...f.hq].join(', '));
  if(f.division.size) parts.push('담당·지사: '+[...f.division].join(', '));
  if(f.channel.size) parts.push('채널: '+[...f.channel].join(', '));
  if(f.agency.size) parts.push('대리점: '+[...f.agency].join(', '));
  return parts.length?parts.join(' / '):'전체';
}
function aggRows(rows, key){
  const g=groupBy(rows, r=>r[key]||'미상');
  return Object.entries(g).map(([k,v])=>({
    key:k, sales_qty:sum(v,'sales_qty'), new:sum(v,'new'), mnp:sum(v,'mnp'), mmnp:sum(v,'mmnp'), vmnp:sum(v,'vmnp'), cancel:sum(v,'cancel'), net_add:sum(v,'net_add'),
    sales_amt:sum(v,'sales_amt'), subs_sold:sum(v,'subs_sold'),
    used:sum(v.filter(r=>r.used_type==='중고'),'sales_qty'), kids:sum(v.filter(r=>r.kids_type!=='일반'&&r.kids_type!==''),'sales_qty'), foreigner:sum(v.filter(r=>r.nationality.includes('외국')),'sales_qty'),
    high110:sum(v.filter(r=>r.is110k==='이상'),'sales_qty'),
    arpu: avg(sum(v.map(r=>(+r.arpu||0)*(+r.sales_qty||0))), sum(v,'sales_qty')),
  })).sort((a,b)=>b.sales_qty-a.sales_qty);
}
function drill(field, value){ if(!value) return; state.filters[field].clear(); state.filters[field].add(value); refresh(); }
function attachDrill(plotId, field, labelSource){ const el=document.getElementById(plotId); if(!el) return; el.on('plotly_click', ev=>{ const p=ev.points?.[0]; if(!p) return; const v = p.customdata?.[0] || p.y || p.x; drill(field, v); }); }
function createKPIs(rows, subsRows){
  const s=sum(rows,'sales_qty'), n=sum(rows,'new'), m=sum(rows,'mnp'), c=sum(rows,'cancel'), net=sum(rows,'net_add');
  const subscriber=sum(subsRows,'subs');
  const foreigner=sum(rows.filter(r=>r.nationality.includes('외국')),'sales_qty');
  const kids=sum(rows.filter(r=>r.kids_type!=='일반'&&r.kids_type!==''),'sales_qty');
  const used=sum(rows.filter(r=>r.used_type==='중고'),'sales_qty');
  const high110=sum(rows.filter(r=>r.is110k==='이상'),'sales_qty');
  return `
    <div class="grid3">
      <div class="kpi"><div class="label">판매량</div><div class="value">${fmt(s)}</div></div>
      <div class="kpi"><div class="label">가입자수</div><div class="value">${fmt(subscriber)}</div></div>
      <div class="kpi"><div class="label">순증</div><div class="value">${fmt(net)}</div></div>
      <div class="kpi"><div class="label">중고 비중</div><div class="value">${pct(used,s).toFixed(1)}%</div></div>
      <div class="kpi"><div class="label">키즈 비중</div><div class="value">${pct(kids,s).toFixed(1)}%</div></div>
      <div class="kpi"><div class="label">외국인 비중</div><div class="value">${pct(foreigner,s).toFixed(1)}%</div></div>
      <div class="kpi"><div class="label">110K 비중</div><div class="value">${pct(high110,s).toFixed(1)}%</div></div>
      <div class="kpi"><div class="label">MNP 비중</div><div class="value">${pct(m,s).toFixed(1)}%</div></div>
      <div class="kpi"><div class="label">해지율</div><div class="value">${pct(c,s).toFixed(1)}%</div></div>
    </div>`;
}
function tableHtml(rows, cols){ return `<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${c.format?c.format(r[c.key],r):r[c.key]}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`; }
function renderOrg(){
  const rows=applyFilters(sales), srows=filterSubs(subs);
  const byHq=aggRows(rows,'hq'); const byDiv=aggRows(rows,'division').slice(0,20); const topAgency=aggRows(rows,'agency_name').slice(0,15);
  const tab=document.getElementById('tab-org');
  tab.innerHTML=`<div class="section">${createKPIs(rows,srows)}</div>
  <div class="grid2"><div class="section"><div class="card-title">본부별 판매 현황</div><div id="org_hq" class="plot"></div></div><div class="section"><div class="card-title">담당·지사별 현황</div><div id="org_div" class="plot"></div></div></div>
  <div class="grid2"><div class="section"><div class="card-title">채널별 판매비중</div><div id="org_channel" class="plot short"></div></div><div class="section"><div class="card-title">구분별 비중</div><div id="org_mix" class="plot short"></div></div></div>
  <div class="section"><div class="card-title">TOP 15 대리점</div>${tableHtml(topAgency,[
    {key:'key',label:'대리점'},{key:'sales_qty',label:'판매',format:fmt},{key:'new',label:'신규',format:fmt},{key:'mnp',label:'MNP',format:fmt},{key:'mmnp',label:'M.MNP',format:fmt},{key:'vmnp',label:'V.MNP',format:fmt},{key:'cancel',label:'해지',format:fmt},{key:'net_add',label:'순증',format:fmt},{key:'arpu',label:'ARPU',format:fmt},{key:'used',label:'중고',format:(v,r)=>pct(r.used,r.sales_qty).toFixed(1)+'%'},{key:'kids',label:'키즈',format:(v,r)=>pct(r.kids,r.sales_qty).toFixed(1)+'%'},{key:'foreigner',label:'외국인',format:(v,r)=>pct(r.foreigner,r.sales_qty).toFixed(1)+'%'},{key:'high110',label:'110K',format:(v,r)=>pct(r.high110,r.sales_qty).toFixed(1)+'%'}
  ])}</div>
  <div class="section"><div class="card-title">본부별 종합 실적</div>${tableHtml(byHq,[
    {key:'key',label:'본부'},{key:'sales_qty',label:'판매량',format:fmt},{key:'new',label:'신규',format:fmt},{key:'n010',label:'010',format:(v,r)=>fmt(r.n010||0)},{key:'mmnp',label:'M.MNP',format:fmt},{key:'vmnp',label:'V.MNP',format:fmt},{key:'cancel',label:'해지',format:fmt},{key:'net_add',label:'순증',format:fmt},{key:'arpu',label:'ARPU',format:fmt},{key:'mnp',label:'MNP율',format:(v,r)=>pct(r.mnp,r.sales_qty).toFixed(1)+'%'},{key:'cancel',label:'해지율',format:(v,r)=>pct(r.cancel,r.sales_qty).toFixed(1)+'%'},{key:'used',label:'중고율',format:(v,r)=>pct(r.used,r.sales_qty).toFixed(1)+'%'},{key:'kids',label:'키즈%',format:(v,r)=>pct(r.kids,r.sales_qty).toFixed(1)+'%'},{key:'foreigner',label:'외국인%',format:(v,r)=>pct(r.foreigner,r.sales_qty).toFixed(1)+'%'},{key:'high110',label:'110K%',format:(v,r)=>pct(r.high110,r.sales_qty).toFixed(1)+'%'}
  ])}</div>`;
  Plotly.newPlot('org_hq', [{type:'bar',x:byHq.map(r=>r.sales_qty),y:byHq.map(r=>r.key),orientation:'h',marker:{color:'#0a7b7b'},text:byHq.map(r=>`${r.key}<br>${fmt(r.sales_qty)}`),textposition:'auto',customdata:byHq.map(r=>[r.key])}], {margin:{l:120,r:20,t:10,b:20},paper_bgcolor:'white',plot_bgcolor:'white'});
  Plotly.newPlot('org_div', [{type:'bar',x:byDiv.map(r=>r.sales_qty),y:byDiv.map(r=>r.key),orientation:'h',marker:{color:'#58b7b7'},text:byDiv.map(r=>`${fmt(r.sales_qty)}`),textposition:'outside',customdata:byDiv.map(r=>[r.key])}], {margin:{l:140,r:30,t:10,b:20},paper_bgcolor:'white',plot_bgcolor:'white'});
  const byChannel=aggRows(rows,'channel');
  Plotly.newPlot('org_channel',[{type:'pie',labels:byChannel.map(r=>r.key),values:byChannel.map(r=>r.sales_qty),hole:.48,textinfo:'label+percent'}],{margin:{t:10,b:10,l:10,r:10},paper_bgcolor:'white'});
  const mix=[
    {label:'중고',v:sum(rows.filter(r=>r.used_type==='중고'),'sales_qty')},
    {label:'키즈',v:sum(rows.filter(r=>r.kids_type!=='일반'&&r.kids_type!==''),'sales_qty')},
    {label:'외국인',v:sum(rows.filter(r=>r.nationality.includes('외국')),'sales_qty')},
    {label:'110K',v:sum(rows.filter(r=>r.is110k==='이상'),'sales_qty')}
  ];
  Plotly.newPlot('org_mix',[{type:'bar',x:mix.map(r=>r.label),y:mix.map(r=>r.v),marker:{color:['#005f5f','#157b7b','#2ba0a0','#66c7c7']},text:mix.map(r=>fmt(r.v)),textposition:'outside'}],{margin:{l:40,r:10,t:10,b:30},paper_bgcolor:'white',plot_bgcolor:'white'});
  attachDrill('org_hq','hq'); attachDrill('org_div','division');
}
function renderQuality(){
  const rows=applyFilters(sales); const byChannel=aggRows(rows,'channel');
  const tab=document.getElementById('tab-quality');
  tab.innerHTML=`<div class="grid2"><div class="section"><div class="card-title">채널별 효율 — ARPU × MNP × 해지</div><div id="q_bar" class="plot"></div></div><div class="section"><div class="card-title">채널별 건당매출</div><div id="q_rev" class="plot"></div></div></div>
  <div class="section"><div class="card-title">본부별 효율 상세</div>${tableHtml(aggRows(rows,'hq'),[
    {key:'key',label:'본부'},{key:'sales_qty',label:'판매량',format:fmt},{key:'new',label:'신규',format:fmt},{key:'mmnp',label:'M.MNP',format:fmt},{key:'vmnp',label:'V.MNP',format:fmt},{key:'cancel',label:'해지',format:fmt},{key:'arpu',label:'ARPU',format:fmt},{key:'mnp',label:'MNP율',format:(v,r)=>pct(r.mnp,r.sales_qty).toFixed(1)+'%'},{key:'cancel',label:'해지율',format:(v,r)=>pct(r.cancel,r.sales_qty).toFixed(1)+'%'},{key:'used',label:'중고율',format:(v,r)=>pct(r.used,r.sales_qty).toFixed(1)+'%'},{key:'kids',label:'키즈%',format:(v,r)=>pct(r.kids,r.sales_qty).toFixed(1)+'%'},{key:'foreigner',label:'외국인%',format:(v,r)=>pct(r.foreigner,r.sales_qty).toFixed(1)+'%'},{key:'high110',label:'110K%',format:(v,r)=>pct(r.high110,r.sales_qty).toFixed(1)+'%'}
  ])}</div>`;
  Plotly.newPlot('q_bar',[
    {type:'bar',name:'판매량',x:byChannel.map(r=>r.key),y:byChannel.map(r=>r.sales_qty),marker:{color:'#0a7b7b'},text:byChannel.map(r=>`${r.key}<br>${fmt(r.sales_qty)}`),textposition:'outside'},
    {type:'scatter',name:'ARPU',x:byChannel.map(r=>r.key),y:byChannel.map(r=>r.arpu),yaxis:'y2',mode:'lines+markers+text',text:byChannel.map(r=>fmt(r.arpu)),textposition:'top center',line:{color:'#004a4a'}}
  ],{margin:{l:40,r:40,t:10,b:60},yaxis:{title:'판매량'},yaxis2:{overlaying:'y',side:'right',title:'ARPU'},paper_bgcolor:'white',plot_bgcolor:'white'});
  Plotly.newPlot('q_rev', [{type:'bar',x:byChannel.map(r=>avg(r.sales_amt,r.sales_qty)),y:byChannel.map(r=>r.key),orientation:'h',marker:{color:'#58b7b7'},text:byChannel.map(r=>fmt(avg(r.sales_amt,r.sales_qty))),textposition:'outside'}], {margin:{l:90,r:40,t:10,b:20},paper_bgcolor:'white',plot_bgcolor:'white'});
}
function renderStruct(){
  const rows=applyFilters(sales); const byHq=aggRows(rows,'hq');
  const tab=document.getElementById('tab-struct');
  tab.innerHTML=`<div class="grid2"><div class="section"><div class="card-title">본부별 가입구조 (신규+MNP−해지)</div><div id="s_stack" class="plot"></div></div><div class="section"><div class="card-title">MNP 유입 구성</div><div id="s_mnp" class="plot"></div></div></div>
  <div class="section"><div class="card-title">본부별 순증 현황</div>${tableHtml(byHq,[{key:'key',label:'본부'},{key:'sales_qty',label:'판매',format:fmt},{key:'new',label:'신규',format:fmt},{key:'mmnp',label:'M.MNP',format:fmt},{key:'vmnp',label:'V.MNP',format:fmt},{key:'cancel',label:'해지',format:fmt},{key:'net_add',label:'순증',format:fmt},{key:'net_add',label:'순증률',format:(v,r)=>pct(r.net_add,r.sales_qty).toFixed(1)+'%'}])}</div>`;
  Plotly.newPlot('s_stack',[
    {type:'bar',name:'신규',x:byHq.map(r=>r.key),y:byHq.map(r=>r.new),marker:{color:'#0a7b7b'},text:byHq.map(r=>fmt(r.new)),textposition:'outside'},
    {type:'bar',name:'MNP',x:byHq.map(r=>r.key),y:byHq.map(r=>r.mnp),marker:{color:'#4eb6b6'},text:byHq.map(r=>fmt(r.mnp)),textposition:'outside'},
    {type:'bar',name:'해지',x:byHq.map(r=>r.key),y:byHq.map(r=>-r.cancel),marker:{color:'#9ad9d9'},text:byHq.map(r=>fmt(r.cancel)),textposition:'outside'}
  ],{barmode:'relative',margin:{l:40,r:10,t:10,b:60},paper_bgcolor:'white',plot_bgcolor:'white'});
  Plotly.newPlot('s_mnp',[
    {type:'bar',name:'M.MNP',x:byHq.map(r=>r.key),y:byHq.map(r=>r.mmnp),marker:{color:'#0a7b7b'},text:byHq.map(r=>fmt(r.mmnp)),textposition:'outside'},
    {type:'bar',name:'V.MNP',x:byHq.map(r=>r.key),y:byHq.map(r=>r.vmnp),marker:{color:'#74c9c9'},text:byHq.map(r=>fmt(r.vmnp)),textposition:'outside'}

function renderTabs(){
  const t=document.getElementById('tabs'); t.innerHTML='';
  TAB_DEFS.forEach(([k,label])=>{ const b=document.createElement('button'); b.className='tab'+(state.tab===k?' active':''); b.textContent=label; b.onclick=()=>{ state.tab=k; refresh(); }; t.appendChild(b); });
  document.querySelectorAll('.tab-pane').forEach(el=>el.classList.add('hidden')); document.getElementById('tab-'+state.tab).classList.remove('hidden');
}
function refresh(){
  renderTabs();
  renderChecklist('hqFilter', uniq(sales.map(r=>r.hq)), state.filters.hq);

  renderChecklist('agencyFilter', uniq(applyFilters(sales.filter(r=>!state.filters.agency.size || state.filters.agency.has(r.agency_name))).map(r=>r.agency_name)).slice(0,200), state.filters.agency);

}
